services:
  chess:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: chess-by-datafrog:latest
    container_name: chess-by-datafrog
    working_dir: /app
    command: ["chess"]
    volumes:
      - ./:/app

  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: chess-by-datafrog-dev:latest
    container_name: chess-by-datafrog-dev
    working_dir: /app
    command: ["cargo", "run"]
    volumes:
      - ./:/app
